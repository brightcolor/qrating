services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qrating}
      POSTGRES_USER: ${POSTGRES_USER:-qrating}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qrating}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qrating} -d ${POSTGRES_DB:-qrating}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-qrating}:${POSTGRES_PASSWORD:-qrating}@postgres:5432/${POSTGRES_DB:-qrating}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      ADMIN_APP_URL: ${ADMIN_APP_URL:-}
      FEEDBACK_APP_URL: ${FEEDBACK_APP_URL:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-at-least-32-chars}
      PRETIX_TOKEN_SECRET: ${PRETIX_TOKEN_SECRET:-change-me-32-byte-secret-value!!}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME:-Demo Events}
      ORGANIZATION_SLUG: ${ORGANIZATION_SLUG:-demo-events}
      BILLING_ADMIN_EMAILS: ${BILLING_ADMIN_EMAILS:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
