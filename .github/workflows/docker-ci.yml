name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Unit tests
        run: npm test

      - name: Production dependency audit
        run: npm audit --omit=dev

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: qrating-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: qrating-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Compose build
        run: docker compose build backend frontend

      - name: Start stack
        run: docker compose up -d postgres backend frontend

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health/ready; then
              exit 0
            fi
            docker compose ps
            sleep 3
          done
          docker compose logs backend
          exit 1

      - name: Wait for frontend API proxy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health; then
              exit 0
            fi
            docker compose ps
            sleep 3
          done
          docker compose logs frontend
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
